<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <!-- Tropical sunset background -->
    <radialGradient id="sun-left" cx="10%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#ff8232" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff8232" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun-right" cx="90%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#dc3c64" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#dc3c64" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1c1535"/>
      <stop offset="40%"  stop-color="#0e1a30"/>
      <stop offset="100%" stop-color="#07101f"/>
    </linearGradient>
    <!-- Coral gradient for title -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff8c42"/>
      <stop offset="55%"  stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff4fa3"/>
    </linearGradient>
    <!-- Button gradient -->
    <linearGradient id="btn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c42"/>
      <stop offset="100%" stop-color="#ff6b47"/>
    </linearGradient>
    <!-- Needle track -->
    <linearGradient id="track" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ef5350" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#2ecc71" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#26c6da" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="800" height="420" fill="url(#bg-base)"/>
  <rect width="800" height="420" fill="url(#sun-left)"/>
  <rect width="800" height="420" fill="url(#sun-right)"/>

  <!-- Left: Ukulele illustration -->
  <ellipse cx="148" cy="270" rx="62" ry="72" fill="#2a1a0a" stroke="#5a3a1a" stroke-width="2"/>
  <ellipse cx="148" cy="270" rx="50" ry="60" fill="#3a2510" stroke="none"/>
  <circle cx="148" cy="270" r="18" fill="none" stroke="#1a0e05" stroke-width="3"/>
  <circle cx="148" cy="270" r="14" fill="#1a0e05"/>
  <line x1="138" y1="216" x2="133" y2="335" stroke="#c8a870" stroke-width="1" opacity="0.7"/>
  <line x1="143" y1="214" x2="140" y2="336" stroke="#c8a870" stroke-width="1" opacity="0.7"/>
  <line x1="153" y1="214" x2="156" y2="336" stroke="#c8a870" stroke-width="1" opacity="0.7"/>
  <line x1="158" y1="216" x2="163" y2="335" stroke="#c8a870" stroke-width="1" opacity="0.7"/>
  <rect x="133" y="318" width="30" height="7" rx="2" fill="#5a3a1a"/>
  <rect x="140" y="130" width="16" height="90" rx="3" fill="#2a1a0a" stroke="#5a3a1a" stroke-width="1.5"/>
  <line x1="140" y1="150" x2="156" y2="150" stroke="#8a6030" stroke-width="1.2"/>
  <line x1="140" y1="165" x2="156" y2="165" stroke="#8a6030" stroke-width="1.2"/>
  <line x1="140" y1="180" x2="156" y2="180" stroke="#8a6030" stroke-width="1.2"/>
  <line x1="140" y1="195" x2="156" y2="195" stroke="#8a6030" stroke-width="1.2"/>
  <line x1="140" y1="210" x2="156" y2="210" stroke="#8a6030" stroke-width="1.2"/>
  <rect x="139" y="128" width="18" height="4" rx="1" fill="#d4b896"/>
  <rect x="137" y="90" width="22" height="42" rx="4" fill="#2a1a0a" stroke="#5a3a1a" stroke-width="1.5"/>
  <circle cx="134" cy="100" r="5" fill="#7a5a30" stroke="#c8a870" stroke-width="1"/>
  <circle cx="162" cy="100" r="5" fill="#7a5a30" stroke="#c8a870" stroke-width="1"/>
  <circle cx="134" cy="116" r="5" fill="#7a5a30" stroke="#c8a870" stroke-width="1"/>
  <circle cx="162" cy="116" r="5" fill="#7a5a30" stroke="#c8a870" stroke-width="1"/>
  <line x1="134" y1="100" x2="126" y2="100" stroke="#7a5a30" stroke-width="2"/>
  <line x1="162" y1="100" x2="170" y2="100" stroke="#7a5a30" stroke-width="2"/>
  <line x1="134" y1="116" x2="126" y2="116" stroke="#7a5a30" stroke-width="2"/>
  <line x1="162" y1="116" x2="170" y2="116" stroke="#7a5a30" stroke-width="2"/>
  <line x1="143" y1="128" x2="141" y2="218" stroke="#c8a870" stroke-width="0.8" opacity="0.6"/>
  <line x1="147" y1="128" x2="146" y2="218" stroke="#c8a870" stroke-width="0.8" opacity="0.6"/>
  <line x1="151" y1="128" x2="152" y2="218" stroke="#c8a870" stroke-width="0.8" opacity="0.6"/>
  <line x1="155" y1="128" x2="157" y2="218" stroke="#c8a870" stroke-width="0.8" opacity="0.6"/>

  <!-- Hibiscus top-right decoration (small) -->
  <g transform="translate(770,50)" opacity="0.35">
    <g transform="translate(0,0)">
      <ellipse cx="0" cy="-16" rx="7" ry="12" fill="#ff6b6b" transform="rotate(0)"/>
      <ellipse cx="0" cy="-16" rx="7" ry="12" fill="#ff8c42" transform="rotate(72)"/>
      <ellipse cx="0" cy="-16" rx="7" ry="12" fill="#ff6b6b" transform="rotate(144)"/>
      <ellipse cx="0" cy="-16" rx="7" ry="12" fill="#ff8c42" transform="rotate(216)"/>
      <ellipse cx="0" cy="-16" rx="7" ry="12" fill="#ff6b6b" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="6" fill="#ffd166"/>
    </g>
  </g>

  <!-- Divider -->
  <line x1="250" y1="60" x2="250" y2="380" stroke="rgba(255,200,150,0.08)" stroke-width="1"/>

  <!-- Right: App UI -->

  <!-- Header with hibiscus + Pacifico-style title -->
  <g transform="translate(290, 72)">
    <!-- Hibiscus icon -->
    <g transform="translate(19,19)">
      <ellipse cx="0" cy="-13" rx="6.5" ry="10.5" fill="#ff6b6b" transform="rotate(0)"   opacity="0.95"/>
      <ellipse cx="0" cy="-13" rx="6.5" ry="10.5" fill="#ff8c42" transform="rotate(72)"  opacity="0.9"/>
      <ellipse cx="0" cy="-13" rx="6.5" ry="10.5" fill="#ff6b6b" transform="rotate(144)" opacity="0.95"/>
      <ellipse cx="0" cy="-13" rx="6.5" ry="10.5" fill="#ff8c42" transform="rotate(216)" opacity="0.9"/>
      <ellipse cx="0" cy="-13" rx="6.5" ry="10.5" fill="#ff6b6b" transform="rotate(288)" opacity="0.95"/>
      <circle cx="0" cy="0" r="5.5" fill="#ffd166"/>
      <line x1="0" y1="-2" x2="0" y2="-12" stroke="#fff8dc" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="0" cy="-13.5" r="2" fill="#fff8dc"/>
    </g>
    <text x="50" y="26" font-family="Georgia, serif" font-size="26" font-weight="700" fill="url(#title-grad)" letter-spacing="0.5" filter="url(#soft-glow)">Ukulele Tuner</text>
    <text x="50" y="46" font-family="system-ui, sans-serif" font-size="12.5" fill="#9ab8cc">Aloha! Tune your ukulele right in the browser.</text>
  </g>

  <!-- String buttons -->
  <g transform="translate(290, 132)">
    <rect x="0"   y="0" width="96" height="52" rx="8" fill="rgba(255,107,71,0.15)" stroke="#ff6b47" stroke-width="2"/>
    <text x="48"  y="24" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fef3e4" text-anchor="middle">G</text>
    <text x="48"  y="42" font-family="'Courier New', monospace" font-size="11" fill="#9ab8cc" text-anchor="middle">392 Hz</text>

    <rect x="106" y="0" width="96" height="52" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <text x="154" y="24" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fef3e4" text-anchor="middle">C</text>
    <text x="154" y="42" font-family="'Courier New', monospace" font-size="11" fill="#9ab8cc" text-anchor="middle">262 Hz</text>

    <rect x="212" y="0" width="96" height="52" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <text x="260" y="24" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fef3e4" text-anchor="middle">E</text>
    <text x="260" y="42" font-family="'Courier New', monospace" font-size="11" fill="#9ab8cc" text-anchor="middle">330 Hz</text>

    <rect x="318" y="0" width="96" height="52" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <text x="366" y="24" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#fef3e4" text-anchor="middle">A</text>
    <text x="366" y="42" font-family="'Courier New', monospace" font-size="11" fill="#9ab8cc" text-anchor="middle">440 Hz</text>
  </g>

  <!-- Meter card — in-tune state with tropical green glow -->
  <rect x="290" y="204" width="460" height="178" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(46,204,113,0.6)" stroke-width="1.5" filter="url(#soft-glow)"/>

  <text x="308" y="232" font-family="'Courier New', monospace" font-size="14" fill="#9ab8cc">392.0 Hz</text>
  <text x="692" y="232" font-family="system-ui, sans-serif" font-size="12" fill="#9ab8cc" text-anchor="end">Holding last reading…</text>

  <!-- Big note -->
  <text x="308" y="296" font-family="system-ui, sans-serif" font-size="64" font-weight="700" fill="#fef3e4" letter-spacing="-2" filter="url(#glow)">G4</text>
  <text x="404" y="283" font-family="'Courier New', monospace" font-size="15" fill="#2ecc71">in tune</text>

  <!-- In-tune message -->
  <text x="308" y="308" font-family="system-ui, sans-serif" font-size="12.5" fill="#2ecc71">Aloha — you're in tune!</text>

  <!-- Needle scale -->
  <text x="308" y="340" font-family="system-ui, sans-serif" font-size="13" fill="#9ab8cc">♭</text>
  <text x="526" y="340" font-family="system-ui, sans-serif" font-size="13" fill="#2ecc71" text-anchor="middle" font-weight="700">|</text>
  <text x="742" y="340" font-family="system-ui, sans-serif" font-size="13" fill="#9ab8cc" text-anchor="end">♯</text>

  <rect x="308" y="344" width="434" height="9" rx="5" fill="url(#track)"/>
  <!-- Needle centred -->
  <rect x="521" y="339" width="10" height="20" rx="2" fill="#fef3e4" filter="url(#soft-glow)"/>

  <!-- Target line -->
  <text x="525" y="390" font-family="'Courier New', monospace" font-size="11" fill="#9ab8cc" text-anchor="middle">Target: G ≈ 392.00 Hz</text>

  <!-- Mahalo footer text -->
  <text x="525" y="408" font-family="Georgia, serif" font-size="11" fill="#ff8c42" text-anchor="middle" opacity="0.6">Mahalo for tuning with us.</text>
</svg>
